name: Build Wessam VIP Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    # تحديث إلى v4 لضمان التوافق
    - name: Checkout Project Code
      uses: actions/checkout@v4

    - name: Setup Theos
      uses: actions/checkout@v4
      with:
        repository: theos/theos
        path: theos
        submodules: true

    - name: Set THEOS Environment Variable
      run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

    - name: Setup iOS SDKs
      uses: actions/checkout@v4
      with:
        repository: theos/sdks
        path: theos/sdks

    - name: Build Tweak (Make Package)
      run: |
        make package FINALPACKAGE=1

    # تحديث الإصدار هنا من v3 إلى v4 لحل المشكلة نهائياً
    - name: Upload Compiled Tweak
      uses: actions/upload-artifact@v4
      with:
        name: Wessam-VIP-Hack
        path: packages/*.deb
        
